<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mabi-Auto 監控</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* warm dark base — amber-tinted blacks */
  --bg:       #0b0804;
  --surf:     #131009;
  --card:     #1a1610;
  --card2:    #201c14;
  --border:   #2e261a;
  --border2:  #3c3222;

  /* text — cool whites for high contrast against warm bg */
  --text:     #f4f0e8;
  --sub:      #c8bfad;
  --dim:      #8a7f6e;
  --dim2:     #5a5244;

  /* status */
  --green:    #40d67e;
  --green-bg: rgba(64,214,126,.08);
  --yellow:   #f5bc30;
  --yellow-bg:rgba(245,188,48,.08);
  --red:      #f25c50;
  --red-bg:   rgba(242,92,80,.08);
  --gray:     #7a7060;
  --gray-bg:  rgba(122,112,96,.08);

  /* amber accent */
  --amber:    #c8881e;
  --amber2:   #f0a830;
  --amber3:   #ffd080;

  --r: 12px;
  --font: 'Noto Sans TC', system-ui, sans-serif;
  --mono: 'JetBrains Mono', 'Consolas', monospace;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  font-size: 14px;
  line-height: 1.5;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  -webkit-font-smoothing: antialiased;
}

/* ══════════════════════════════════════
   LOGIN
══════════════════════════════════════ */
#login {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  background:
    radial-gradient(ellipse 80% 50% at 50% -10%, rgba(200,136,30,.14) 0%, transparent 60%),
    var(--bg);
}

.login-box {
  width: 100%;
  max-width: 348px;
  background: var(--card);
  border: 1px solid var(--border2);
  border-radius: 20px;
  padding: 40px 28px 36px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  box-shadow:
    0 0 0 1px rgba(200,136,30,.1),
    0 0 60px rgba(200,136,30,.08),
    0 40px 80px rgba(0,0,0,.7);
}

.login-brand {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
  margin-bottom: 6px;
}

.login-emblem {
  width: 56px;
  height: 56px;
  background: linear-gradient(145deg, #201a0c, #2e2414);
  border: 1px solid rgba(200,136,30,.35);
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 0 24px rgba(200,136,30,.18), inset 0 1px 0 rgba(255,200,80,.08);
}

.login-brand h1 {
  font-size: 19px;
  font-weight: 700;
  letter-spacing: -.02em;
  color: var(--amber3);
  text-shadow: 0 0 20px rgba(200,136,30,.4);
}

.login-sub {
  font-size: 12px;
  color: var(--dim);
  margin-top: -8px;
}

.login-box input {
  background: rgba(255,255,255,.04);
  border: 1.5px solid var(--border2);
  border-radius: 10px;
  color: var(--text);
  font-family: var(--font);
  font-size: 14px;
  padding: 12px 14px;
  width: 100%;
  outline: none;
  transition: border-color .15s, box-shadow .15s;
  -webkit-appearance: none;
}
.login-box input::placeholder { color: var(--dim2); }
.login-box input:focus {
  border-color: var(--amber2);
  box-shadow: 0 0 0 3px rgba(200,136,30,.14);
}

.login-btn {
  background: linear-gradient(135deg, #a06a14, var(--amber2));
  border: none;
  border-radius: 10px;
  color: #120c02;
  cursor: pointer;
  font-family: var(--font);
  font-size: 14px;
  font-weight: 700;
  padding: 13px;
  width: 100%;
  transition: opacity .15s, transform .1s;
  letter-spacing: .02em;
  box-shadow: 0 4px 20px rgba(200,136,30,.25);
}
.login-btn:hover  { opacity: .9; transform: translateY(-1px); }
.login-btn:active { opacity: .8; transform: translateY(0); }
.login-btn:disabled { background: var(--card2); color: var(--dim); cursor: default; transform: none; opacity: 1; box-shadow: none; }

.login-err {
  font-size: 12px;
  color: var(--red);
  text-align: center;
  min-height: 16px;
}

/* ══════════════════════════════════════
   DASHBOARD
══════════════════════════════════════ */
#dash { display: none; flex-direction: column; flex: 1; }

/* ── Header ─────────────────────────── */
header {
  background: var(--surf);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  height: 52px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  position: sticky;
  top: 0;
  z-index: 100;
}

/* subtle amber line at very bottom of header */
header::after {
  content: '';
  position: absolute;
  bottom: -1px;
  left: 0;
  width: 100%;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(200,136,30,.4) 30%, rgba(200,136,30,.4) 70%, transparent);
}

.h-brand {
  display: flex;
  align-items: center;
  gap: 8px;
  white-space: nowrap;
  min-width: 0;
  flex-shrink: 1;
  overflow: hidden;
}

.h-mark {
  width: 26px;
  height: 26px;
  background: linear-gradient(145deg, #201a0c, #2e2414);
  border: 1px solid rgba(200,136,30,.3);
  border-radius: 7px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.h-name {
  font-size: 14px;
  font-weight: 700;
  letter-spacing: -.01em;
  color: var(--amber3);
}

.h-tag {
  font-size: 12px;
  color: var(--dim);
  font-weight: 400;
}

.h-right {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
}

#sync-label {
  font-size: 11px;
  color: var(--dim);
  white-space: nowrap;
  font-family: var(--mono);
}
#sync-label.ok  { color: var(--green); }
#sync-label.err { color: var(--red); }

.btn {
  background: transparent;
  border: 1px solid var(--border2);
  border-radius: 7px;
  color: var(--sub);
  cursor: pointer;
  font-family: var(--font);
  font-size: 12px;
  padding: 6px 12px;
  white-space: nowrap;
  transition: background .12s, border-color .12s, color .12s;
  line-height: 1.4;
}
.btn:hover  { background: var(--card2); border-color: var(--border2); color: var(--text); }
.btn:active { background: var(--card); }

/* ── Main ───────────────────────────── */
main {
  padding: 20px 16px;
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

/* ── Summary strip (flat bar, not cards) ─ */
.summary {
  display: flex;
  background: var(--surf);
  border: 1px solid var(--border);
  border-radius: var(--r);
  overflow: hidden;
}

.scard {
  flex: 1;
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  border-right: 1px solid var(--border);
}
.scard:last-child { border-right: none; }

.scard-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.scard.running .scard-dot { background: var(--green); box-shadow: 0 0 6px var(--green); animation: pulse 2s ease-in-out infinite; }
.scard.warning .scard-dot { background: var(--yellow); box-shadow: 0 0 6px var(--yellow); animation: pulse 2s ease-in-out infinite; }
.scard.error   .scard-dot { background: var(--red); box-shadow: 0 0 6px var(--red); }
.scard.offline .scard-dot { background: var(--gray); }

.scard-body { display: flex; flex-direction: column; gap: 1px; }

.scard-val {
  font-size: 22px;
  font-weight: 700;
  line-height: 1;
  font-family: var(--mono);
  letter-spacing: -.04em;
}
.scard.running .scard-val { color: var(--green); }
.scard.warning .scard-val { color: var(--yellow); }
.scard.error   .scard-val { color: var(--red); }
.scard.offline .scard-val { color: var(--gray); }

.scard-label {
  font-size: 10px;
  color: var(--dim2);
  font-weight: 500;
  letter-spacing: .05em;
  text-transform: uppercase;
}

@media (max-width: 500px) {
  .summary { flex-wrap: wrap; }
  .scard { flex: 1 1 50%; }
  .scard:nth-child(2) { border-right: none; }
  .scard:nth-child(3), .scard:nth-child(4) { border-top: 1px solid var(--border); }
  .scard:nth-child(4) { border-right: none; }
}

/* ── Table wrapper ──────────────────── */
.tbl-wrap {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r);
  overflow: hidden;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}

table {
  width: 100%;
  border-collapse: collapse;
  min-width: 320px;
}

thead th {
  background: var(--surf);
  border-bottom: 1px solid var(--border);
  color: var(--dim);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: .08em;
  padding: 11px 16px;
  text-align: left;
  white-space: nowrap;
  text-transform: uppercase;
}

tbody tr {
  border-bottom: 1px solid var(--border);
  transition: background .1s;
}
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: rgba(255,255,255,.02); }

td {
  padding: 13px 16px;
  vertical-align: middle;
  font-size: 13px;
}

.col-extra { display: none; }
@media (min-width: 640px) { .col-extra { display: table-cell; } }

/* ── Status badge ───────────────────── */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  border-radius: 20px;
  padding: 3px 10px 3px 8px;
  font-size: 11px;
  font-weight: 600;
  white-space: nowrap;
  letter-spacing: .02em;
}
.badge-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  flex-shrink: 0;
}

.badge-running { background: var(--green-bg); color: var(--green); border: 1px solid rgba(64,214,126,.2); }
.badge-running .badge-dot { background: var(--green); animation: pulse 1.4s ease-in-out infinite; }
.badge-warning { background: var(--yellow-bg); color: var(--yellow); border: 1px solid rgba(245,188,48,.2); }
.badge-warning .badge-dot { background: var(--yellow); animation: pulse 2s ease-in-out infinite; }
.badge-error   { background: var(--red-bg); color: var(--red); border: 1px solid rgba(242,92,80,.2); }
.badge-error   .badge-dot { background: var(--red); }
.badge-offline { background: var(--gray-bg); color: var(--gray); border: 1px solid rgba(122,112,96,.15); }
.badge-offline .badge-dot { background: var(--gray); }

@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.2; } }

/* ── Cell styles ────────────────────── */
.user-name { font-weight: 600; color: var(--text); }
.user-id   { font-family: var(--mono); font-size: 10px; color: var(--dim2); margin-top: 3px; }

.num { font-family: var(--mono); font-size: 13px; color: var(--sub); font-weight: 500; }
.time-cell { font-family: var(--mono); font-size: 11px; color: var(--dim); white-space: nowrap; }
.err-cell  { font-size: 12px; color: var(--red); max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.ver-cell  { font-family: var(--mono); font-size: 10px; color: var(--dim2); }

/* ── Empty / spinner ────────────────── */
.empty-row td { text-align: center; padding: 56px; color: var(--dim); }

.spinner {
  display: inline-block;
  width: 12px; height: 12px;
  border: 2px solid var(--border2);
  border-top-color: var(--amber2);
  border-radius: 50%;
  animation: spin .7s linear infinite;
  vertical-align: middle;
  margin-right: 5px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Cards grid ─────────────────────── */
#cards-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 10px;
}
@media (min-width: 560px)  { #cards-grid { grid-template-columns: repeat(2, 1fr); } }
@media (min-width: 900px)  { #cards-grid { grid-template-columns: repeat(3, 1fr); } }
@media (min-width: 1200px) { #cards-grid { grid-template-columns: repeat(4, 1fr); } }

.mcard {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  transition: border-color .15s, box-shadow .15s, opacity .15s, transform .15s;
  position: relative;
  cursor: grab;
  user-select: none;
}
.mcard:hover { border-color: var(--border2); box-shadow: 0 4px 20px rgba(0,0,0,.3); }
.mcard.dragging {
  opacity: .35;
  cursor: grabbing;
}
.mcard.drag-over {
  border-color: rgba(200,136,30,.6);
  box-shadow: 0 0 0 2px rgba(200,136,30,.25);
}

/* drag handle hint in top-right */
.mcard-drag-hint {
  position: absolute;
  top: 10px; right: 10px;
  display: flex; flex-direction: column; gap: 2px;
  opacity: 0;
  transition: opacity .15s;
  pointer-events: none;
  padding: 2px;
}
.mcard:hover .mcard-drag-hint { opacity: 1; }
.mcard-drag-hint span {
  display: block;
  width: 14px; height: 1.5px;
  background: var(--dim2);
  border-radius: 1px;
}

/* left status bar */
.mcard::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
}
.mcard.running::before { background: var(--green); box-shadow: 0 0 8px var(--green); }
.mcard.warning::before { background: var(--yellow); box-shadow: 0 0 8px var(--yellow); }
.mcard.error::before   { background: var(--red);   box-shadow: 0 0 6px var(--red); }
.mcard.offline::before { background: var(--gray); }

.mcard.running { border-color: rgba(64,214,126,.2); }
.mcard.warning { border-color: rgba(245,188,48,.2); }
.mcard.error   { border-color: rgba(242,92,80,.2); }

/* header row */
.mcard-head {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  padding: 14px 14px 10px 18px;
  gap: 8px;
}

.mcard-name {
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -.01em;
  line-height: 1.2;
}
.mcard-id {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--dim2);
  margin-top: 3px;
}

/* stats row */
.mcard-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
}

.mstat {
  padding: 12px 10px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  border-right: 1px solid var(--border);
}
.mstat:last-child { border-right: none; }

.mstat-val {
  font-family: var(--mono);
  font-size: 18px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -.02em;
  line-height: 1;
}
.mstat-val.dim { color: var(--dim); font-size: 14px; }

.mstat-label {
  font-size: 10px;
  color: var(--dim2);
  font-weight: 500;
  letter-spacing: .04em;
  text-transform: uppercase;
  text-align: center;
}

/* footer row */
.mcard-foot {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 9px 14px 9px 18px;
  gap: 8px;
}

.mcard-meta {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}

.mcard-metaitem {
  display: flex;
  align-items: baseline;
  gap: 5px;
}
.mcard-metaitem-label {
  font-size: 10px;
  color: var(--dim2);
  letter-spacing: .02em;
}
.mcard-metaitem-val {
  font-family: var(--mono);
  font-size: 15px;
  font-weight: 600;
  color: var(--sub);
  letter-spacing: -.01em;
}

.mcard-time {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--dim2);
  white-space: nowrap;
  flex-shrink: 0;
}

.mcard-err {
  font-size: 11px;
  color: var(--red);
  padding: 7px 14px 9px 18px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  line-height: 1.5;
  border-top: 1px solid rgba(242,92,80,.15);
  background: rgba(242,92,80,.04);
}

.empty-state {
  text-align: center;
  padding: 56px 24px;
  color: var(--dim);
  font-size: 13px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r);
}

@media (max-width: 400px) {
  #sync-label { display: none; }
  .btn { padding: 6px 9px; font-size: 11px; }
  main { padding: 12px 10px; }
}

@media (min-width: 720px)  { main { padding: 24px 20px; } }
@media (min-width: 1024px) { main { padding: 28px; } }
</style>
</head>
<body>

<!-- ════════ LOGIN ════════ -->
<div id="login">
  <div class="login-box">
    <div class="login-brand">
      <div class="login-emblem">
        <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg" width="28" height="28" style="color:#f0a830">
          <polygon points="10,0.8 19.2,10 10,19.2 0.8,10" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/>
          <polygon points="10,4.8 15.2,10 10,15.2 4.8,10" stroke="currentColor" stroke-width="0.7" opacity="0.4" stroke-linejoin="round"/>
          <text x="10" y="10" text-anchor="middle" dominant-baseline="central" font-size="10" font-weight="900" fill="currentColor" font-family="sans-serif">$</text>
        </svg>
      </div>
      <h1>Mabi-Auto</h1>
      <p class="login-sub">輸入監控密碼以繼續</p>
    </div>
    <input id="pw" type="password" placeholder="密碼" autocomplete="current-password">
    <button class="login-btn" id="login-btn">登入</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<!-- ════════ DASHBOARD ════════ -->
<div id="dash">
  <header>
    <div class="h-brand">
      <div class="h-mark">
        <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg" width="16" height="16" style="color:#f0a830">
          <polygon points="10,0.8 19.2,10 10,19.2 0.8,10" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/>
          <polygon points="10,4.8 15.2,10 10,15.2 4.8,10" stroke="currentColor" stroke-width="0.7" opacity="0.4" stroke-linejoin="round"/>
          <text x="10" y="10" text-anchor="middle" dominant-baseline="central" font-size="10" font-weight="900" fill="currentColor" font-family="sans-serif">$</text>
        </svg>
      </div>
      <span class="h-name">Mabi-Auto</span>
      <span class="h-tag">監控</span>
    </div>
    <div class="h-right">
      <span id="sync-label">—</span>
      <button class="btn" id="refresh-btn">↻ 重整</button>
      <button class="btn" id="logout-btn">登出</button>
    </div>
  </header>

  <main>
    <div class="summary">
      <div class="scard running">
        <div class="scard-dot"></div>
        <div class="scard-body">
          <div class="scard-val" id="cnt-running">—</div>
          <div class="scard-label">執行中</div>
        </div>
      </div>
      <div class="scard warning">
        <div class="scard-dot"></div>
        <div class="scard-body">
          <div class="scard-val" id="cnt-warning">—</div>
          <div class="scard-label">警告</div>
        </div>
      </div>
      <div class="scard error">
        <div class="scard-dot"></div>
        <div class="scard-body">
          <div class="scard-val" id="cnt-error">—</div>
          <div class="scard-label">異常／中斷</div>
        </div>
      </div>
      <div class="scard offline">
        <div class="scard-dot"></div>
        <div class="scard-body">
          <div class="scard-val" id="cnt-offline">—</div>
          <div class="scard-label">離線</div>
        </div>
      </div>
    </div>

    <div id="cards-grid"></div>
  </main>
</div>

<script>
const EDGE_URL     = "https://mabi-auto-api.mabi-auto.workers.dev/monitor_status";
const OFFLINE_MINS = 12;
const REFRESH_SEC  = 30;

let pw = "", timer = null;

const $login    = document.getElementById("login");
const $dash     = document.getElementById("dash");
const $pw       = document.getElementById("pw");
const $loginBtn = document.getElementById("login-btn");
const $loginErr = document.getElementById("login-err");
const $sync     = document.getElementById("sync-label");

const saved = sessionStorage.getItem("mpw");
if (saved) { pw = saved; showDash(); }

$pw.addEventListener("keydown", e => e.key === "Enter" && doLogin());
$loginBtn.addEventListener("click", doLogin);

document.getElementById("logout-btn").addEventListener("click", () => {
  sessionStorage.removeItem("mpw");
  clearInterval(timer); timer = null; pw = "";
  $login.style.display = "flex"; $dash.style.display = "none";
  $pw.value = ""; $loginBtn.disabled = false; $loginBtn.textContent = "登入";
});

document.getElementById("refresh-btn").addEventListener("click", () => {
  clearInterval(timer);
  fetchData().then(() => { timer = setInterval(fetchData, REFRESH_SEC * 1000); });
});

async function doLogin() {
  const val = $pw.value.trim();
  if (!val) return;
  $loginBtn.disabled = true;
  $loginBtn.innerHTML = '<span class="spinner"></span>驗證中...';
  $loginErr.textContent = "";
  pw = val;
  const ok = await fetchData();
  if (ok) { sessionStorage.setItem("mpw", pw); showDash(); }
  else {
    pw = "";
    $loginErr.textContent = "密碼錯誤或無法連線";
    $loginBtn.disabled = false; $loginBtn.textContent = "登入";
  }
}

function showDash() {
  $login.style.display = "none"; $dash.style.display = "flex";
  clearInterval(timer);
  timer = setInterval(fetchData, REFRESH_SEC * 1000);
}

async function fetchData() {
  $sync.className = ""; $sync.innerHTML = '<span class="spinner"></span>';
  try {
    const res = await fetch(EDGE_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ password: pw }),
    });
    if (res.status === 401) { $sync.className = "err"; $sync.textContent = "密碼錯誤"; return false; }
    if (!res.ok) throw new Error(res.status);
    const { rows } = await res.json();
    render(rows ?? []);
    $sync.className = "ok";
    $sync.textContent = "更新於 " + new Date().toLocaleTimeString("zh-TW");
    return true;
  } catch {
    $sync.className = "err"; $sync.textContent = "連線失敗"; return false;
  }
}

function effStatus(row) {
  const mins = (Date.now() - new Date(row.last_seen)) / 60000;
  if (mins > OFFLINE_MINS) return "offline";
  return row.status || "offline";
}

const STATUS_LABEL = { running:"執行中", warning:"警告", error:"異常/中斷", offline:"離線" };

function makeBadge(s) {
  return `<span class="badge badge-${s}"><span class="badge-dot"></span>${esc(STATUS_LABEL[s]??s)}</span>`;
}

function render(rows) {
  let r=0,w=0,e=0,o=0;
  rows.forEach(row => {
    const s = effStatus(row);
    if(s==="running")r++; else if(s==="warning")w++; else if(s==="error")e++; else o++;
  });
  document.getElementById("cnt-running").textContent = r;
  document.getElementById("cnt-warning").textContent = w;
  document.getElementById("cnt-error").textContent   = e;
  document.getElementById("cnt-offline").textContent  = o;

  const grid = document.getElementById("cards-grid");

  if (rows.length === 0) {
    grid.innerHTML = '<div class="empty-state">尚無裝置資料</div>';
    return;
  }

  // apply saved order from localStorage, fallback to name sort
  const savedOrder = getSavedOrder();
  if (savedOrder.length) {
    rows = [...rows].sort((a, b) => {
      const ai = savedOrder.indexOf(a.machine_id);
      const bi = savedOrder.indexOf(b.machine_id);
      const av = ai === -1 ? 9999 : ai;
      const bv = bi === -1 ? 9999 : bi;
      if (av !== bv) return av - bv;
      return (a.user_name||'').localeCompare(b.user_name||'', 'zh-TW');
    });
  } else {
    rows = [...rows].sort((a,b) => (a.user_name||'').localeCompare(b.user_name||'', 'zh-TW'));
  }

  grid.innerHTML = rows.map(row => {
    const s   = effStatus(row);
    const rph = fmtRph(row.runs_count, row.elapsed_seconds);
    const elt = fmtElapsed(row.elapsed_seconds);
    const errHtml = row.error_msg
      ? `<div class="mcard-err" title="${esc(row.error_msg)}">⚠ ${esc(row.error_msg)}</div>`
      : "";
    return `<div class="mcard ${s}" draggable="true" data-id="${esc(row.machine_id)}">
      <div class="mcard-drag-hint"><span></span><span></span><span></span></div>
      <div class="mcard-head">
        <div>
          <div class="mcard-name">${esc(row.user_name||"未命名")}</div>
          <div class="mcard-id">${esc(row.machine_id.slice(0,10))}…</div>
        </div>
        ${makeBadge(s)}
      </div>
      <div class="mcard-stats">
        <div class="mstat">
          <div class="mstat-val ${row.runs_count?'':'dim'}">${row.runs_count||"—"}</div>
          <div class="mstat-label">刷場數</div>
        </div>
        <div class="mstat">
          <div class="mstat-val ${rph!=='—'?'':'dim'}">${rph}</div>
          <div class="mstat-label">場 / 時</div>
        </div>
        <div class="mstat">
          <div class="mstat-val ${elt!=='—'?'':'dim'}" style="font-size:14px;">${elt}</div>
          <div class="mstat-label">運行時間</div>
        </div>
      </div>
      <div class="mcard-foot">
        <div class="mcard-meta">
          <div class="mcard-metaitem"><span class="mcard-metaitem-label">存金幣</span><span class="mcard-metaitem-val">${row.deposits_count}</span></div>
          <div class="mcard-metaitem"><span class="mcard-metaitem-label">修裝備</span><span class="mcard-metaitem-val">${row.repairs_count}</span></div>
        </div>
        <div class="mcard-time" title="${esc(row.last_seen)}">${relTime(row.last_seen)}</div>
      </div>
      ${errHtml}
    </div>`;
  }).join("");

  // activate drag-and-drop after rendering
  initDrag();
}

// ── localStorage order ───────────────
const LS_KEY = "mabi_card_order";
function getSavedOrder() {
  try { return JSON.parse(localStorage.getItem(LS_KEY) || "[]"); } catch { return []; }
}
function saveOrder(ids) {
  localStorage.setItem(LS_KEY, JSON.stringify(ids));
}
function currentOrder() {
  return [...document.querySelectorAll("#cards-grid .mcard")].map(el => el.dataset.id);
}

// ── Drag and drop (mouse + touch) ───
function initDrag() {
  const grid = document.getElementById("cards-grid");
  let dragged = null;

  // ── Mouse drag (desktop) ─────────
  grid.querySelectorAll(".mcard").forEach(card => {
    card.addEventListener("dragstart", e => {
      dragged = card;
      card.classList.add("dragging");
      e.dataTransfer.effectAllowed = "move";
    });
    card.addEventListener("dragend", () => {
      card.classList.remove("dragging");
      grid.querySelectorAll(".mcard").forEach(c => c.classList.remove("drag-over"));
      saveOrder(currentOrder());
      dragged = null;
    });
    card.addEventListener("dragover", e => {
      e.preventDefault();
      if (card === dragged) return;
      grid.querySelectorAll(".mcard").forEach(c => c.classList.remove("drag-over"));
      card.classList.add("drag-over");
    });
    card.addEventListener("dragleave", () => card.classList.remove("drag-over"));
    card.addEventListener("drop", e => {
      e.preventDefault();
      if (!dragged || card === dragged) return;
      card.classList.remove("drag-over");
      const cards = [...grid.querySelectorAll(".mcard")];
      const dragIdx = cards.indexOf(dragged);
      const dropIdx = cards.indexOf(card);
      if (dragIdx < dropIdx) grid.insertBefore(dragged, card.nextSibling);
      else grid.insertBefore(dragged, card);
      saveOrder(currentOrder());
    });
  });

  // ── Touch drag (mobile) ──────────
  let touchDragged = null;
  let touchClone   = null;
  let touchOffX = 0, touchOffY = 0;

  grid.querySelectorAll(".mcard").forEach(card => {
    card.addEventListener("touchstart", e => {
      if (e.touches.length !== 1) return;
      const t = e.touches[0];
      const rect = card.getBoundingClientRect();
      touchOffX = t.clientX - rect.left;
      touchOffY = t.clientY - rect.top;
      touchDragged = card;

      // ghost clone
      touchClone = card.cloneNode(true);
      touchClone.style.cssText = `
        position: fixed;
        top: ${rect.top}px;
        left: ${rect.left}px;
        width: ${rect.width}px;
        pointer-events: none;
        opacity: .7;
        z-index: 999;
        border-radius: var(--r);
        box-shadow: 0 8px 32px rgba(0,0,0,.5);
        transition: none;
      `;
      document.body.appendChild(touchClone);
      card.classList.add("dragging");
    }, { passive: true });

    card.addEventListener("touchmove", e => {
      if (!touchDragged || !touchClone) return;
      e.preventDefault();
      const t = e.touches[0];
      touchClone.style.top  = (t.clientY - touchOffY) + "px";
      touchClone.style.left = (t.clientX - touchOffX) + "px";

      // find card under finger
      touchClone.style.display = "none";
      const el = document.elementFromPoint(t.clientX, t.clientY);
      touchClone.style.display = "";
      const target = el && el.closest(".mcard");
      grid.querySelectorAll(".mcard").forEach(c => c.classList.remove("drag-over"));
      if (target && target !== touchDragged) target.classList.add("drag-over");
    }, { passive: false });

    card.addEventListener("touchend", e => {
      if (!touchDragged || !touchClone) return;
      const t = e.changedTouches[0];
      touchClone.remove(); touchClone = null;
      touchDragged.classList.remove("dragging");
      grid.querySelectorAll(".mcard").forEach(c => c.classList.remove("drag-over"));

      touchClone = null;
      const el = document.elementFromPoint(t.clientX, t.clientY);
      const target = el && el.closest(".mcard");
      if (target && target !== touchDragged) {
        const cards = [...grid.querySelectorAll(".mcard")];
        const dragIdx = cards.indexOf(touchDragged);
        const dropIdx = cards.indexOf(target);
        if (dragIdx < dropIdx) grid.insertBefore(touchDragged, target.nextSibling);
        else grid.insertBefore(touchDragged, target);
        saveOrder(currentOrder());
      }
      touchDragged = null;
    }, { passive: true });
  });
}

function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function relTime(iso){const s=(Date.now()-new Date(iso))/1000;if(s<60)return Math.round(s)+" 秒前";if(s<3600)return Math.round(s/60)+" 分前";if(s<86400)return Math.round(s/3600)+" 時前";return Math.round(s/86400)+" 天前";}
function fmtElapsed(sec){if(!sec||sec<=0)return"—";const h=Math.floor(sec/3600),m=Math.floor((sec%3600)/60),s=sec%60;return`${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;}
function fmtRph(runs,sec){if(!sec||sec<=0||!runs)return"—";return(runs/(sec/3600)).toFixed(1);}
</script>
