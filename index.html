<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mabi-Auto 監控</title>
<style>
/* ── Reset & Variables ─────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #0d1117;
  --surf:    #161b22;
  --card:    #1c2128;
  --border:  #30363d;
  --text:    #e6edf3;
  --dim:     #8b949e;
  --green:   #3fb950;
  --yellow:  #d29922;
  --red:     #f85149;
  --gray:    #6e7681;
  --blue:    #58a6ff;
  --r:       10px;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: "Segoe UI", "Microsoft JhengHei", system-ui, sans-serif;
  font-size: 14px;
  line-height: 1.5;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
}

/* ═══════════════════════════════════════════════════
   LOGIN
═══════════════════════════════════════════════════ */
#login {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}

.login-box {
  width: 100%;
  max-width: 340px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 36px 28px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.login-icon { font-size: 36px; text-align: center; }

.login-box h1 {
  font-size: 17px;
  font-weight: 700;
  text-align: center;
}

.login-box p {
  font-size: 13px;
  color: var(--dim);
  text-align: center;
  margin-top: -8px;
}

.login-box input {
  background: #21262d;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-size: 15px;
  padding: 11px 13px;
  width: 100%;
  outline: none;
  transition: border-color .15s;
  -webkit-appearance: none;
  appearance: none;
}
.login-box input:focus { border-color: var(--blue); }

.login-box button {
  background: #238636;
  border: none;
  border-radius: 8px;
  color: #fff;
  cursor: pointer;
  font-size: 14px;
  font-weight: 600;
  padding: 12px;
  width: 100%;
  transition: opacity .15s;
}
.login-box button:hover  { opacity: .85; }
.login-box button:active { opacity: .7; }
.login-box button:disabled { background: #444; cursor: default; opacity: 1; }

.login-err {
  font-size: 13px;
  color: var(--red);
  text-align: center;
  min-height: 18px;
}

/* ═══════════════════════════════════════════════════
   DASHBOARD
═══════════════════════════════════════════════════ */
#dash { display: none; flex-direction: column; flex: 1; }

/* ── Header ──────────────────────────────────────── */
header {
  background: var(--surf);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  height: 52px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  position: sticky;
  top: 0;
  z-index: 100;
}

.h-title {
  font-size: 15px;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 8px;
  white-space: nowrap;
}

.h-right {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}

#sync-label {
  font-size: 11px;
  color: var(--dim);
  white-space: nowrap;
}
#sync-label.ok  { color: var(--green); }
#sync-label.err { color: var(--red); }

.btn {
  background: #21262d;
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  cursor: pointer;
  font-size: 12px;
  padding: 5px 11px;
  white-space: nowrap;
  transition: background .12s;
  line-height: 1.4;
}
.btn:hover  { background: #30363d; }
.btn:active { background: #3d444d; }

/* ── Main ────────────────────────────────────────── */
main {
  padding: 16px;
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

/* ── Summary strip ───────────────────────────────── */
.summary {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}

@media (min-width: 600px) {
  .summary { grid-template-columns: repeat(4, 1fr); }
}

.scard {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.scard-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}
.scard.running .scard-dot  { background: var(--green); }
.scard.warning .scard-dot  { background: var(--yellow); }
.scard.error   .scard-dot  { background: var(--red); }
.scard.offline .scard-dot  { background: var(--gray); }

.scard-val {
  font-size: 22px;
  font-weight: 800;
  line-height: 1;
}
.scard.running .scard-val  { color: var(--green); }
.scard.warning .scard-val  { color: var(--yellow); }
.scard.error   .scard-val  { color: var(--red); }
.scard.offline .scard-val  { color: var(--gray); }

.scard-label {
  font-size: 11px;
  color: var(--dim);
  margin-top: 2px;
}

/* ── Table wrapper ───────────────────────────────── */
.tbl-wrap {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r);
  overflow: hidden;   /* clip rounded corners */
  overflow-x: auto;   /* horizontal scroll on mobile if needed */
  -webkit-overflow-scrolling: touch;
}

table {
  width: 100%;
  border-collapse: collapse;
  min-width: 320px;
}

thead th {
  background: var(--surf);
  border-bottom: 1px solid var(--border);
  color: var(--dim);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: .04em;
  padding: 10px 14px;
  text-align: left;
  white-space: nowrap;
  text-transform: uppercase;
}

tbody tr {
  border-bottom: 1px solid var(--border);
  transition: background .1s;
}
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: rgba(255,255,255,.03); }

td {
  padding: 12px 14px;
  vertical-align: middle;
  font-size: 13px;
}

/* 手機隱藏次要欄位 */
.col-extra { display: none; }

@media (min-width: 640px) {
  .col-extra { display: table-cell; }
}

/* ── Status badge ────────────────────────────────── */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  border-radius: 20px;
  padding: 3px 9px;
  font-size: 11px;
  font-weight: 700;
  white-space: nowrap;
  line-height: 1;
}

.badge-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
  display: block;
}

.badge-running { background: rgba(63,185,80,.15);  color: var(--green);  }
.badge-running .badge-dot  { background: var(--green);  animation: pulse 1.4s ease-in-out infinite; }

.badge-warning { background: rgba(210,153,34,.15); color: var(--yellow); }
.badge-warning .badge-dot  { background: var(--yellow); animation: pulse 2s   ease-in-out infinite; }

.badge-error   { background: rgba(248,81,73,.15);  color: var(--red);    }
.badge-error   .badge-dot  { background: var(--red); }

.badge-offline { background: rgba(110,118,129,.12); color: var(--gray);  }
.badge-offline .badge-dot  { background: var(--gray); }

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50%       { opacity: .2; }
}

/* ── Table cell styles ───────────────────────────── */
.user-name {
  font-weight: 600;
  color: var(--text);
}
.user-id {
  font-family: "Consolas", monospace;
  font-size: 10px;
  color: var(--dim);
  margin-top: 2px;
}

.num {
  font-variant-numeric: tabular-nums;
  font-weight: 600;
  color: var(--text);
}

.time-cell {
  font-size: 12px;
  color: var(--dim);
  white-space: nowrap;
}

.err-cell {
  font-size: 12px;
  color: var(--red);
  max-width: 200px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* ── Empty / spinner ─────────────────────────────── */
.empty-row td {
  text-align: center;
  padding: 48px;
  color: var(--dim);
  font-size: 13px;
}

.spinner {
  display: inline-block;
  width: 12px;
  height: 12px;
  border: 2px solid var(--border);
  border-top-color: var(--blue);
  border-radius: 50%;
  animation: spin .7s linear infinite;
  vertical-align: middle;
  margin-right: 5px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Larger screens ──────────────────────────────── */
@media (min-width: 720px) {
  main { padding: 20px; gap: 16px; }
  td, thead th { padding: 12px 16px; }
}

@media (min-width: 1024px) {
  main { padding: 24px; }
}
</style>
</head>
<body>

<!-- ════════════════════ LOGIN ════════════════════ -->
<div id="login">
  <div class="login-box">
    <div class="login-icon">⚔️</div>
    <h1>Mabi-Auto 監控</h1>
    <p>輸入監控密碼以繼續</p>
    <input id="pw" type="password" placeholder="密碼" autocomplete="current-password">
    <button id="login-btn">登入</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<!-- ════════════════════ DASHBOARD ════════════════════ -->
<div id="dash">
  <header>
    <div class="h-title">⚔️ Mabi-Auto 監控</div>
    <div class="h-right">
      <span id="sync-label">—</span>
      <button class="btn" id="refresh-btn">↻</button>
      <button class="btn" id="logout-btn">登出</button>
    </div>
  </header>

  <main>
    <!-- Summary -->
    <div class="summary">
      <div class="scard running">
        <div class="scard-dot"></div>
        <div class="scard-body">
          <div class="scard-val" id="cnt-running">—</div>
          <div class="scard-label">執行中</div>
        </div>
      </div>
      <div class="scard warning">
        <div class="scard-dot"></div>
        <div class="scard-body">
          <div class="scard-val" id="cnt-warning">—</div>
          <div class="scard-label">警告</div>
        </div>
      </div>
      <div class="scard error">
        <div class="scard-dot"></div>
        <div class="scard-body">
          <div class="scard-val" id="cnt-error">—</div>
          <div class="scard-label">異常/中斷</div>
        </div>
      </div>
      <div class="scard offline">
        <div class="scard-dot"></div>
        <div class="scard-body">
          <div class="scard-val" id="cnt-offline">—</div>
          <div class="scard-label">離線</div>
        </div>
      </div>
    </div>

    <!-- Table -->
    <div class="tbl-wrap">
      <table>
        <thead>
          <tr>
            <th>使用者</th>
            <th>狀態</th>
            <th>刷場</th>
            <th class="col-extra">存金幣</th>
            <th class="col-extra">修裝備</th>
            <th>最後回報</th>
            <th class="col-extra">訊息</th>
          </tr>
        </thead>
        <tbody id="tbody">
          <tr class="empty-row"><td colspan="7">載入中...</td></tr>
        </tbody>
      </table>
    </div>
  </main>
</div>

<script>
// ── 設定 ──────────────────────────────────────────
const EDGE_URL     = "https://mabi-auto-api.mabi-auto.workers.dev/monitor_status";
const OFFLINE_MINS = 12;
const REFRESH_SEC  = 30;
// ─────────────────────────────────────────────────

let pw = "";
let timer = null;

// ── Elements ──────────────────────────────────────
const $login    = document.getElementById("login");
const $dash     = document.getElementById("dash");
const $pw       = document.getElementById("pw");
const $loginBtn = document.getElementById("login-btn");
const $loginErr = document.getElementById("login-err");
const $sync     = document.getElementById("sync-label");
const $tbody    = document.getElementById("tbody");

// ── Session restore ───────────────────────────────
const saved = sessionStorage.getItem("mpw");
if (saved) { pw = saved; showDash(); }

$pw.addEventListener("keydown", e => e.key === "Enter" && doLogin());
$loginBtn.addEventListener("click", doLogin);

document.getElementById("logout-btn").addEventListener("click", () => {
  sessionStorage.removeItem("mpw");
  clearInterval(timer); timer = null;
  pw = "";
  $login.style.display = "flex";
  $dash.style.display  = "none";
  $pw.value = "";
  $loginBtn.disabled = false;
  $loginBtn.textContent = "登入";
});

document.getElementById("refresh-btn").addEventListener("click", () => {
  clearInterval(timer);
  fetchData().then(() => { timer = setInterval(fetchData, REFRESH_SEC * 1000); });
});

// ── Login ──────────────────────────────────────────
async function doLogin() {
  const val = $pw.value.trim();
  if (!val) return;
  $loginBtn.disabled = true;
  $loginBtn.innerHTML = '<span class="spinner"></span>驗證中...';
  $loginErr.textContent = "";

  pw = val;
  const ok = await fetchData();
  if (ok) {
    sessionStorage.setItem("mpw", pw);
    showDash();
  } else {
    pw = "";
    $loginErr.textContent = "密碼錯誤或無法連線";
    $loginBtn.disabled = false;
    $loginBtn.textContent = "登入";
  }
}

function showDash() {
  $login.style.display = "none";
  $dash.style.display  = "flex";
  clearInterval(timer);
  timer = setInterval(fetchData, REFRESH_SEC * 1000);
}

// ── Fetch ──────────────────────────────────────────
async function fetchData() {
  $sync.className = "";
  $sync.innerHTML = '<span class="spinner"></span>';
  try {
    const res = await fetch(EDGE_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ password: pw }),
    });
    if (res.status === 401) {
      $sync.className = "err";
      $sync.textContent = "密碼錯誤";
      return false;
    }
    if (!res.ok) throw new Error(res.status);
    const { rows } = await res.json();
    render(rows ?? []);
    $sync.className = "ok";
    $sync.textContent = "更新於 " + new Date().toLocaleTimeString("zh-TW");
    return true;
  } catch {
    $sync.className = "err";
    $sync.textContent = "連線失敗";
    return false;
  }
}

// ── Status helper ──────────────────────────────────
function effStatus(row) {
  const mins = (Date.now() - new Date(row.last_seen)) / 60000;
  if (mins > OFFLINE_MINS) return "offline";
  return row.status || "offline";
}

const STATUS_LABEL = {
  running: "執行中",
  warning: "警告",
  error:   "異常/中斷",
  offline: "離線",
};

function makeBadge(s) {
  const label = STATUS_LABEL[s] ?? s;
  return `<span class="badge badge-${s}"><span class="badge-dot"></span>${esc(label)}</span>`;
}

// ── Render ──────────────────────────────────────────
function render(rows) {
  let r = 0, w = 0, e = 0, o = 0;
  rows.forEach(row => {
    const s = effStatus(row);
    if      (s === "running") r++;
    else if (s === "warning") w++;
    else if (s === "error")   e++;
    else                      o++;
  });
  document.getElementById("cnt-running").textContent = r;
  document.getElementById("cnt-warning").textContent = w;
  document.getElementById("cnt-error").textContent   = e;
  document.getElementById("cnt-offline").textContent  = o;

  if (rows.length === 0) {
    $tbody.innerHTML = '<tr class="empty-row"><td colspan="7">尚無裝置資料</td></tr>';
    return;
  }

  $tbody.innerHTML = rows.map(row => {
    const s   = effStatus(row);
    const err = row.error_msg
      ? `<span class="err-cell" title="${esc(row.error_msg)}">${esc(row.error_msg)}</span>`
      : `<span style="color:var(--dim)">—</span>`;
    return `<tr>
      <td>
        <div class="user-name">${esc(row.user_name || "未命名")}</div>
        <div class="user-id">${esc(row.machine_id.slice(0,10))}…</div>
      </td>
      <td>${makeBadge(s)}</td>
      <td><span class="num">${row.runs_count}</span></td>
      <td class="col-extra"><span class="num">${row.deposits_count}</span></td>
      <td class="col-extra"><span class="num">${row.repairs_count}</span></td>
      <td class="time-cell" title="${esc(row.last_seen)}">${relTime(row.last_seen)}</td>
      <td class="col-extra">${err}</td>
    </tr>`;
  }).join("");
}

// ── Helpers ────────────────────────────────────────
function esc(s) {
  return String(s)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;")
    .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function relTime(iso) {
  const s = (Date.now() - new Date(iso)) / 1000;
  if (s < 60)    return Math.round(s) + " 秒前";
  if (s < 3600)  return Math.round(s / 60) + " 分鐘前";
  if (s < 86400) return Math.round(s / 3600) + " 小時前";
  return Math.round(s / 86400) + " 天前";
}
</script>
</body>
</html>
