<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mabi-Auto 監控 — DEMO（rph 趨勢試做）</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* warm dark base — amber-tinted blacks */
  --bg:       #0b0804;
  --surf:     #131009;
  --card:     #1a1610;
  --card2:    #201c14;
  --border:   #2e261a;
  --border2:  #3c3222;

  /* text — cool whites for high contrast against warm bg */
  --text:     #f4f0e8;
  --sub:      #c8bfad;
  --dim:      #a09080;
  --dim2:     #7a6e5e;

  /* status */
  --green:    #40d67e;
  --green-bg: rgba(64,214,126,.08);
  --yellow:   #f5bc30;
  --yellow-bg:rgba(245,188,48,.08);
  --red:      #f25c50;
  --red-bg:   rgba(242,92,80,.08);
  --gray:     #7a7060;
  --gray-bg:  rgba(122,112,96,.08);

  /* amber accent */
  --amber:    #c8881e;
  --amber2:   #f0a830;
  --amber3:   #ffd080;

  --r: 12px;
  --font: 'Noto Sans TC', system-ui, sans-serif;
  --mono: 'JetBrains Mono', 'Consolas', monospace;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  font-size: 14px;
  line-height: 1.5;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  -webkit-font-smoothing: antialiased;
}

/* ══════════════════════════════════════
   LOGIN
══════════════════════════════════════ */
#login {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  background:
    radial-gradient(ellipse 80% 50% at 50% -10%, rgba(200,136,30,.14) 0%, transparent 60%),
    var(--bg);
}

.login-box {
  width: 100%;
  max-width: 348px;
  background: var(--card);
  border: 1px solid var(--border2);
  border-radius: 20px;
  padding: 40px 28px 36px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  box-shadow:
    0 0 0 1px rgba(200,136,30,.1),
    0 0 60px rgba(200,136,30,.08),
    0 40px 80px rgba(0,0,0,.7);
}

.login-brand {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
  margin-bottom: 6px;
}

.login-emblem {
  width: 56px;
  height: 56px;
  background: linear-gradient(145deg, #201a0c, #2e2414);
  border: 1px solid rgba(200,136,30,.35);
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 0 24px rgba(200,136,30,.18), inset 0 1px 0 rgba(255,200,80,.08);
}

.login-brand h1 {
  font-size: 19px;
  font-weight: 700;
  letter-spacing: -.02em;
  color: var(--amber3);
  text-shadow: 0 0 20px rgba(200,136,30,.4);
}

.login-sub {
  font-size: 12px;
  color: var(--dim);
  margin-top: -8px;
}

.login-box input {
  background: rgba(255,255,255,.04);
  border: 1.5px solid var(--border2);
  border-radius: 10px;
  color: var(--text);
  font-family: var(--font);
  font-size: 14px;
  padding: 12px 14px;
  width: 100%;
  outline: none;
  transition: border-color .15s, box-shadow .15s;
  -webkit-appearance: none;
}
.login-box input::placeholder { color: var(--dim2); }
.login-box input:focus {
  border-color: var(--amber2);
  box-shadow: 0 0 0 3px rgba(200,136,30,.14);
}

.login-btn {
  background: linear-gradient(135deg, #a06a14, var(--amber2));
  border: none;
  border-radius: 10px;
  color: #120c02;
  cursor: pointer;
  font-family: var(--font);
  font-size: 14px;
  font-weight: 700;
  padding: 13px;
  width: 100%;
  transition: opacity .15s, transform .1s;
  letter-spacing: .02em;
  box-shadow: 0 4px 20px rgba(200,136,30,.25);
}
.login-btn:hover  { opacity: .9; transform: translateY(-1px); }
.login-btn:active { opacity: .8; transform: translateY(0); }
.login-btn:disabled { background: var(--card2); color: var(--dim); cursor: default; transform: none; opacity: 1; box-shadow: none; }

.login-err {
  font-size: 12px;
  color: var(--red);
  text-align: center;
  min-height: 16px;
}

/* ══════════════════════════════════════
   DASHBOARD
══════════════════════════════════════ */
#dash { display: none; flex-direction: column; flex: 1; }

/* ── Header ─────────────────────────── */
header {
  background: var(--surf);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  height: 52px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  position: sticky;
  top: 0;
  z-index: 100;
}

/* subtle amber line at very bottom of header */
header::after {
  content: '';
  position: absolute;
  bottom: -1px;
  left: 0;
  width: 100%;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(200,136,30,.4) 30%, rgba(200,136,30,.4) 70%, transparent);
}

.h-brand {
  display: flex;
  align-items: center;
  gap: 8px;
  white-space: nowrap;
  min-width: 0;
  flex-shrink: 1;
  overflow: hidden;
}

.h-mark {
  width: 26px;
  height: 26px;
  background: linear-gradient(145deg, #201a0c, #2e2414);
  border: 1px solid rgba(200,136,30,.3);
  border-radius: 7px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.h-name {
  font-size: 14px;
  font-weight: 700;
  letter-spacing: -.01em;
  color: var(--amber3);
}

.h-tag {
  font-size: 12px;
  color: var(--dim);
  font-weight: 400;
}

.h-right {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
}

#sync-label {
  font-size: 11px;
  color: var(--dim);
  white-space: nowrap;
  font-family: var(--mono);
}
#sync-label.ok  { color: var(--green); }
#sync-label.err { color: var(--red); }

.btn {
  background: transparent;
  border: 1px solid var(--border2);
  border-radius: 7px;
  color: var(--sub);
  cursor: pointer;
  font-family: var(--font);
  font-size: 12px;
  padding: 6px 12px;
  white-space: nowrap;
  transition: background .12s, border-color .12s, color .12s;
  line-height: 1.4;
}
.btn:hover  { background: var(--card2); border-color: var(--border2); color: var(--text); }
.btn:active { background: var(--card); }

/* ── Main ───────────────────────────── */
main {
  padding: 20px 16px;
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

/* ── Summary strip (flat bar, not cards) ─ */
.summary {
  display: flex;
  background: var(--surf);
  border: 1px solid var(--border);
  border-radius: var(--r);
  overflow: hidden;
}

.scard {
  flex: 1;
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  border-right: 1px solid var(--border);
}
.scard:last-child { border-right: none; }

/* 統計組（存金幣、總刷場、機器總數）背景略深，與狀態組區分 */
.scard.stat-group {
  background: var(--card);
}

/* 狀態組與統計組之間的分隔線 */
.scard.stat-group-first {
  border-left: 2px solid var(--amber);
}

.scard-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.scard.running .scard-dot { background: var(--green); box-shadow: 0 0 6px var(--green); animation: pulse 2s ease-in-out infinite; }
.scard.warning .scard-dot { background: var(--yellow); box-shadow: 0 0 6px var(--yellow); animation: pulse 2s ease-in-out infinite; }
.scard.error   .scard-dot { background: var(--red); box-shadow: 0 0 6px var(--red); }
.scard.offline .scard-dot { background: var(--gray); }

.scard-body { display: flex; flex-direction: column; gap: 1px; }

.scard-val {
  font-size: 22px;
  font-weight: 700;
  line-height: 1;
  font-family: var(--mono);
  letter-spacing: -.04em;
}
.scard.running .scard-val { color: var(--green); }
.scard.warning .scard-val { color: var(--yellow); }
.scard.error   .scard-val { color: var(--red); }
.scard.offline .scard-val { color: var(--gray); }

.scard-label {
  font-size: 10px;
  color: var(--dim2);
  font-weight: 500;
  letter-spacing: .05em;
  text-transform: uppercase;
}

@media (max-width: 500px) {
  .summary { flex-wrap: wrap; }
  .scard { flex: 1 1 50%; }
  .scard:nth-child(2) { border-right: none; }
  .scard:nth-child(3), .scard:nth-child(4) { border-top: 1px solid var(--border); }
  .scard:nth-child(4) { border-right: none; }
  .scard:nth-child(5), .scard:nth-child(6), .scard:nth-child(7) { flex: 1 1 33.33%; border-top: 1px solid var(--border); }
  .scard:nth-child(7) { border-right: none; }
  .scard.stat-group-first { border-left: none; border-top: 2px solid var(--border2); }
  .scard.stat-group-first::before { display: none; }
}

/* ── Table wrapper ──────────────────── */
.tbl-wrap {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r);
  overflow: hidden;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}

table {
  width: 100%;
  border-collapse: collapse;
  min-width: 320px;
}

thead th {
  background: var(--surf);
  border-bottom: 1px solid var(--border);
  color: var(--dim);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: .08em;
  padding: 11px 16px;
  text-align: left;
  white-space: nowrap;
  text-transform: uppercase;
}

tbody tr {
  border-bottom: 1px solid var(--border);
  transition: background .1s;
}
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: rgba(255,255,255,.02); }

td {
  padding: 13px 16px;
  vertical-align: middle;
  font-size: 13px;
}

.col-extra { display: none; }
@media (min-width: 640px) { .col-extra { display: table-cell; } }

/* ── Status badge ───────────────────── */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  border-radius: 20px;
  padding: 3px 10px 3px 8px;
  font-size: 11px;
  font-weight: 600;
  white-space: nowrap;
  letter-spacing: .02em;
}
.badge-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  flex-shrink: 0;
}

.badge-running { background: var(--green-bg); color: var(--green); border: 1px solid rgba(64,214,126,.2); }
.badge-running .badge-dot { background: var(--green); animation: pulse 1.4s ease-in-out infinite; }
.badge-warning { background: var(--yellow-bg); color: var(--yellow); border: 1px solid rgba(245,188,48,.2); }
.badge-warning .badge-dot { background: var(--yellow); animation: pulse 2s ease-in-out infinite; }
.badge-error   { background: var(--red-bg); color: var(--red); border: 1px solid rgba(242,92,80,.2); }
.badge-error   .badge-dot { background: var(--red); }
.badge-offline { background: var(--gray-bg); color: var(--gray); border: 1px solid rgba(122,112,96,.15); }
.badge-offline .badge-dot { background: var(--gray); }

@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.2; } }

/* ── Cell styles ────────────────────── */
.user-name { font-weight: 600; color: var(--text); }
.user-id   { font-family: var(--mono); font-size: 10px; color: var(--dim2); margin-top: 3px; }

.num { font-family: var(--mono); font-size: 13px; color: var(--sub); font-weight: 500; }
.time-cell { font-family: var(--mono); font-size: 11px; color: var(--dim); white-space: nowrap; }
.err-cell  { font-size: 12px; color: var(--red); max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.ver-cell  { font-family: var(--mono); font-size: 10px; color: var(--dim2); }

/* ── Empty / spinner ────────────────── */
.empty-row td { text-align: center; padding: 56px; color: var(--dim); }

.spinner {
  display: inline-block;
  width: 12px; height: 12px;
  border: 2px solid var(--border2);
  border-top-color: var(--amber2);
  border-radius: 50%;
  animation: spin .7s linear infinite;
  vertical-align: middle;
  margin-right: 5px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── DEMO toggle bar ────────────────── */
.demo-bar {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 12px;
  background: rgba(200,136,30,.06);
  border: 1px dashed rgba(200,136,30,.35);
  border-radius: 8px;
  font-size: 11px;
  color: var(--dim);
  flex-wrap: wrap;
}
.demo-bar-label {
  font-weight: 600;
  color: var(--amber2);
  letter-spacing: .04em;
  text-transform: uppercase;
  font-size: 10px;
}
.demo-bar-sep {
  width: 1px; height: 14px; background: var(--border2); margin: 0 6px;
}
.dbtn {
  background: transparent;
  border: 1px solid var(--border2);
  border-radius: 5px;
  color: var(--dim);
  cursor: pointer;
  font-family: var(--mono);
  font-size: 11px;
  padding: 3px 9px;
  transition: background .12s, color .12s, border-color .12s;
}
.dbtn:hover  { color: var(--text); border-color: var(--amber); }
.dbtn.active { background: rgba(200,136,30,.14); border-color: var(--amber); color: var(--amber2); }

/* ── Toolbar (search + filter) ─────── */
.toolbar {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}

.search-wrap {
  position: relative;
  flex: 1;
  min-width: 160px;
}
.search-wrap svg {
  position: absolute;
  left: 10px;
  top: 50%;
  transform: translateY(-50%);
  pointer-events: none;
  color: var(--dim2);
}
#search-input {
  width: 100%;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-family: var(--font);
  font-size: 13px;
  padding: 8px 10px 8px 32px;
  outline: none;
  transition: border-color .15s, box-shadow .15s;
}
#search-input::placeholder { color: var(--dim2); }
#search-input:focus {
  border-color: var(--amber);
  box-shadow: 0 0 0 3px rgba(200,136,30,.12);
}

.filter-btns {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
}

.fbtn {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 7px;
  color: var(--dim);
  cursor: pointer;
  font-family: var(--font);
  font-size: 11px;
  font-weight: 600;
  padding: 6px 11px;
  white-space: nowrap;
  transition: background .12s, border-color .12s, color .12s;
  display: flex;
  align-items: center;
  gap: 5px;
  letter-spacing: .02em;
}
.fbtn:hover { background: var(--card2); color: var(--sub); }
.fbtn.active {
  background: var(--card2);
  border-color: var(--border2);
  color: var(--text);
}
.fbtn-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}
.fbtn[data-filter="all"].active   { border-color: var(--amber); color: var(--amber2); }
.fbtn[data-filter="running"].active { border-color: rgba(64,214,126,.4); color: var(--green); }
.fbtn[data-filter="warning"].active { border-color: rgba(245,188,48,.4); color: var(--yellow); }
.fbtn[data-filter="error"].active   { border-color: rgba(242,92,80,.4); color: var(--red); }
.fbtn[data-filter="offline"].active { border-color: var(--border2); color: var(--gray); }

/* ── Sparkline ──────────────────────── */
.mcard-spark {
  padding: 8px 14px 10px 18px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 12px;
}
.spark-item {
  display: flex;
  flex-direction: column;
  gap: 3px;
  flex: 1;
}
.spark-label {
  font-size: 9px;
  color: var(--dim2);
  letter-spacing: .04em;
  text-transform: uppercase;
}
.spark-svg {
  display: block;
  width: 100%;
  height: 28px;
  overflow: visible;
}

/* 存金幣資訊區（取代原存金幣 sparkline） */
.dep-info {
  display: flex;
  flex-direction: column;
  gap: 2px;
  padding-top: 1px;
  font-family: var(--mono);
  line-height: 1.3;
}
.dep-info-primary {
  font-size: 12px;
  color: var(--sub);
  letter-spacing: -.01em;
}
.dep-info-primary.stale { color: var(--red); }
.dep-info-secondary {
  font-size: 10px;
  color: var(--dim2);
}

/* ── Cards grid ─────────────────────── */
#cards-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 10px;
}
@media (min-width: 560px)  { #cards-grid { grid-template-columns: repeat(2, 1fr); } }
@media (min-width: 900px)  { #cards-grid { grid-template-columns: repeat(3, 1fr); } }
@media (min-width: 1200px) { #cards-grid { grid-template-columns: repeat(4, 1fr); } }

.mcard {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  transition: border-color .15s, box-shadow .15s, opacity .15s, transform .15s;
  position: relative;
  cursor: grab;
  user-select: none;
}
.mcard:hover { border-color: var(--border2); box-shadow: 0 4px 20px rgba(0,0,0,.3); }
.mcard.dragging {
  opacity: .35;
  cursor: grabbing;
}
/* long-press activating feedback */
.mcard.press-active {
  transform: scale(.98);
  border-color: rgba(200,136,30,.5) !important;
  transition: transform .15s, border-color .15s;
}
.mcard.drag-over {
  border-color: rgba(200,136,30,.6);
  box-shadow: 0 0 0 2px rgba(200,136,30,.25);
}

/* drag handle hint in top-right */
.mcard-drag-hint {
  position: absolute;
  top: 10px; right: 10px;
  display: flex; flex-direction: column; gap: 2px;
  opacity: 0;
  transition: opacity .15s;
  pointer-events: none;
  padding: 2px;
}
.mcard:hover .mcard-drag-hint { opacity: 1; }
.mcard-drag-hint span {
  display: block;
  width: 14px; height: 1.5px;
  background: var(--dim2);
  border-radius: 1px;
}

/* left status bar */
.mcard::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
}
.mcard.running::before { background: var(--green); box-shadow: 0 0 8px var(--green); }
.mcard.warning::before { background: var(--yellow); box-shadow: 0 0 8px var(--yellow); }
.mcard.error::before   { background: var(--red);   box-shadow: 0 0 6px var(--red); }
.mcard.offline::before { background: var(--gray); }

.mcard.running { border-color: rgba(64,214,126,.2); }
.mcard.warning { border-color: rgba(245,188,48,.2); }
.mcard.error   { border-color: rgba(242,92,80,.2); }

/* header row */
.mcard-head {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  padding: 14px 14px 10px 18px;
  gap: 8px;
}

.mcard-name {
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -.01em;
  line-height: 1.2;
}
.mcard-id {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--dim2);
}

/* stats row */
.mcard-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
}

.mstat {
  padding: 12px 10px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  border-right: 1px solid var(--border);
}
.mstat:last-child { border-right: none; }

.mstat-val {
  font-family: var(--mono);
  font-size: 18px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -.02em;
  line-height: 1;
}
.mstat-val.dim { color: var(--dim); font-size: 14px; }

.mstat-label {
  font-size: 10px;
  color: var(--dim2);
  font-weight: 500;
  letter-spacing: .04em;
  text-transform: uppercase;
  text-align: center;
}

/* footer row */
.mcard-foot {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 9px 14px 9px 18px;
  gap: 8px;
}

.mcard-meta {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}

.mcard-metaitem {
  display: flex;
  align-items: baseline;
  gap: 5px;
}
.mcard-metaitem-label {
  font-size: 10px;
  color: var(--dim2);
  letter-spacing: .02em;
}
.mcard-metaitem-val {
  font-family: var(--mono);
  font-size: 15px;
  font-weight: 600;

<script>
// ════════════════════════════════════════════════════════════════
// DEMO MODE — 假資料、跳過登入、不打 API
// 此檔僅用於評估「刷場 sparkline 改成 rph」的視覺效果
// 確認方向後再把對應變更搬回 index.html
// ════════════════════════════════════════════════════════════════
const DEMO = true;

const EDGE_URL     = "https://mabi-auto-api.mabi-auto.workers.dev/monitor_status";
const OFFLINE_MINS = 12;
const REFRESH_SEC  = 30;

let pw = "demo", timer = null;

const $login    = document.getElementById("login");
const $dash     = document.getElementById("dash");
const $pw       = document.getElementById("pw");
const $loginBtn = document.getElementById("login-btn");
const $loginErr = document.getElementById("login-err");
const $sync     = document.getElementById("sync-label");

// ── DEMO mock data ──────────────────────────────────────
//   根據預先設計的「速率行為」產生累計刷場/存金幣歷史，
//   主要用來驗證 toRateSeries() + sparkline 的視覺效果是否好讀。
//   每台機器代表一種典型情境（健康/下滑/波動/重啟/停擺/離線）。
const MOCK = (() => {
  const NOW         = Date.now();
  const HOURS       = 24;                            // 過去 24h 歷史
  const startTime   = NOW - HOURS * 3600 * 1000;
  const SAMPLE_MIN  = 2.5;                           // 平均 2.5 分一筆樣本
  const sampleMs    = SAMPLE_MIN * 60 * 1000;

  // 由 rate(t) [單位 rph] 產生「累計場數」樣本序列
  //   sampleActive(t) 可選：模擬「前端關閉、無人取樣」的時段。
  //     bot 仍持續累計，但這段時間不會推樣本進歷史。
  function genRuns(rateFn, t0, t1, sampleActive) {
    const out = [];
    let cum = 0;
    out.push({ t: t0, v: 0 });
    let lastPushed = t0;
    const stepMs = 60 * 1000;                        // 1 分鐘步進
    for (let t = t0 + stepMs; t <= t1; t += stepMs) {
      const r = Math.max(0, rateFn(t));
      cum += r / 60;                                 // rph → 每分鐘
      if (sampleActive && !sampleActive(t)) continue;
      // 樣本之間加入 0.5~1.5 倍隨機抖動，模擬實際 dedupe 行為
      const interval = sampleMs * (0.5 + Math.random());
      if (t - lastPushed >= interval) {
        const intCum = Math.floor(cum);
        if (intCum !== out[out.length - 1].v) {
          out.push({ t, v: intCum });
          lastPushed = t;
        }
      }
    }
    return out;
  }

  // 累計存金幣：每 ~2h 事件一次（小幅隨機）
  //   sampleActive：同上，模擬前端關閉期間沒有樣本被推進歷史
  function genDeposits(t0, t1, sampleActive) {
    const out = [];
    let cum = 0;
    out.push({ t: t0, v: 0 });
    let nextT = t0 + (1.5 + Math.random() * 1.0) * 3600 * 1000;
    while (nextT <= t1) {
      cum += Math.floor(80 + Math.random() * 160);
      if (!sampleActive || sampleActive(nextT)) {
        out.push({ t: nextT, v: cum });
      }
      nextT += (1.7 + Math.random() * 0.6) * 3600 * 1000;
    }
    return out;
  }

  // 串接「重啟前」+「重啟後」兩段（重啟時累計歸零）
  function genRunsWithRestart(rateFn, restartAt, t0, t1) {
    const before = genRuns(rateFn, t0, restartAt);
    const after  = genRuns(rateFn, restartAt + 60_000, t1);
    // after 段累計已從 0 起算，直接接上即可
    return [...before, ...after];
  }

  const machines = [
    {
      machine_id: 'M-ALPHA-001', user_name: '阿爾法（穩定）',
      status: 'running',
      runs_now: 720, deposits_now: 4800, repairs: 12,
      elapsed: 22 * 3600, last_seen_offset_s: 18,
      app_version: '0.8.4', python_version: '0.7.1', err: null,
      rate: () => 30 + (Math.random() - 0.5) * 4,                   // ~30 rph 微抖動
    },
    {
      machine_id: 'M-BETA-002', user_name: '貝塔（效率下滑）',
      status: 'warning',
      runs_now: 580, deposits_now: 3800, repairs: 8,
      elapsed: 20 * 3600, last_seen_offset_s: 42,
      app_version: '0.8.4', python_version: '0.7.1', err: null,
      rate: (t) => {
        const p = (t - startTime) / (HOURS * 3600 * 1000);          // 0→1
        return Math.max(8, 38 - p * 26 + (Math.random() - 0.5) * 3);
      },
    },
    {
      machine_id: 'M-GAMMA-003', user_name: '伽瑪（波動明顯）',
      status: 'running',
      runs_now: 660, deposits_now: 4200, repairs: 14,
      elapsed: 21 * 3600, last_seen_offset_s: 28,
      app_version: '0.8.4', python_version: '0.7.1', err: null,
      rate: (t) => {
        const mins = (t - startTime) / 60000;
        return 28 + 14 * Math.sin(mins * Math.PI * 2 / 90)          // 90 分週期
                  + (Math.random() - 0.5) * 4;
      },
    },
    {
      machine_id: 'M-DELTA-004', user_name: '德爾塔（剛重啟）',
      status: 'running',
      runs_now: 95, deposits_now: 3200, repairs: 11,
      elapsed: 1.5 * 3600, last_seen_offset_s: 22,
      app_version: '0.8.4', python_version: '0.7.1', err: null,
      rate: () => 33 + (Math.random() - 0.5) * 4,
      restartAt: NOW - 1.5 * 3600 * 1000,                            // 1.5 小時前重啟
    },
    {
      machine_id: 'M-EPS-005', user_name: '艾普西隆（接近停擺）',
      status: 'warning',
      runs_now: 510, deposits_now: 3400, repairs: 7,
      elapsed: 23 * 3600, last_seen_offset_s: 95,
      app_version: '0.8.3', python_version: '0.7.0', err: null,
      rate: (t) => {
        const mins = (NOW - t) / 60000;                              // 距現在多久(分)
        if (mins < 60) return Math.max(0, 4 + (Math.random() - 0.5) * 3);
        return 28 + (Math.random() - 0.5) * 4;
      },
    },
    {
      machine_id: 'M-ZETA-006', user_name: '澤塔（完全停擺）',
      status: 'error',
      runs_now: 430, deposits_now: 2900, repairs: 5,
      elapsed: 24 * 3600, last_seen_offset_s: 70,
      app_version: '0.8.4', python_version: '0.7.1',
      err: '偵測卡關超過 10 分鐘',
      rate: (t) => {
        const mins = (NOW - t) / 60000;
        if (mins < 75) return 0;
        return 25 + (Math.random() - 0.5) * 4;
      },
    },
    {
      machine_id: 'M-ETA-007', user_name: '伊塔（離線）',
      status: 'running',
      runs_now: 380, deposits_now: 2700, repairs: 6,
      elapsed: 18 * 3600, last_seen_offset_s: 22 * 60,                // 22 分鐘前
      app_version: '0.8.3', python_version: '0.7.0', err: null,
      rate: () => 26 + (Math.random() - 0.5) * 5,
    },
    {
      machine_id: 'M-THETA-008', user_name: '希塔（高速）',
      status: 'running',
      runs_now: 980, deposits_now: 5400, repairs: 18,
      elapsed: 22 * 3600, last_seen_offset_s: 14,
      app_version: '0.8.4', python_version: '0.7.1', err: null,
      rate: () => 44 + (Math.random() - 0.5) * 6,
    },
    {
      machine_id: 'M-LAMBDA-009', user_name: '蘭姆達（資料中斷）',
      status: 'running',
      runs_now: 720, deposits_now: 4500, repairs: 13,
      elapsed: 22 * 3600, last_seen_offset_s: 30,
      app_version: '0.8.4', python_version: '0.7.1', err: null,
      rate: () => 30 + (Math.random() - 0.5) * 5,                    // bot 一直在跑
      // 但「前端」在 6h 前～1h 前這段是關閉狀態，沒推樣本到歷史
      sampleActive: (t) => {
        const gapStart = NOW - 6 * 3600 * 1000;
        const gapEnd   = NOW - 1 * 3600 * 1000;
        return t < gapStart || t > gapEnd;
      },
    },
  ];

  // 預先生成歷史
  const history = {};
  for (const m of machines) {
    const runsRaw = m.restartAt
      ? genRunsWithRestart(m.rate, m.restartAt, startTime, NOW)
      : genRuns(m.rate, startTime, NOW, m.sampleActive);
    const depRaw = genDeposits(startTime, NOW, m.sampleActive);

    // 校準累計值的尾端對齊到 runs_now / deposits_now
    const lastRuns = runsRaw[runsRaw.length - 1].v || 1;
    const runsScale = m.runs_now / lastRuns;
    const runsHist = runsRaw.map(p => ({ t: p.t, v: Math.round(p.v * runsScale) }));

    const lastDep = depRaw[depRaw.length - 1].v || 1;
    const depScale = m.deposits_now / lastDep;
    const depHist = depRaw.map(p => ({ t: p.t, v: Math.round(p.v * depScale) }));

    history[m.machine_id] = { runs: runsHist, deposits: depHist };
  }

  function rows() {
    const _now = Date.now();
    return machines.map(m => ({
      machine_id:      m.machine_id,
      user_name:       m.user_name,
      status:          m.status,
      runs_count:      m.runs_now,
      deposits_count:  m.deposits_now,
      repairs_count:   m.repairs,
      elapsed_seconds: m.elapsed,
      last_seen:       new Date(_now - m.last_seen_offset_s * 1000).toISOString(),
      app_version:     m.app_version,
      python_version:  m.python_version,
      error_msg:       m.err,
    }));
  }

  return { rows, history: () => history };
})();

// DEMO: 直接顯示 dashboard，跳過登入；立即抓一次假資料
if (DEMO) { showDash(); fetchData(); }
else {
  const saved = sessionStorage.getItem("mpw");
  if (saved) { pw = saved; showDash(); }
}

$pw.addEventListener("keydown", e => e.key === "Enter" && doLogin());
$loginBtn.addEventListener("click", doLogin);

document.getElementById("logout-btn").addEventListener("click", () => {
  sessionStorage.removeItem("mpw");
  clearInterval(timer); timer = null; pw = "";
  $login.style.display = "flex"; $dash.style.display = "none";
  $pw.value = ""; $loginBtn.disabled = false; $loginBtn.textContent = "登入";
});

document.getElementById("refresh-btn").addEventListener("click", () => {
  clearInterval(timer);
  fetchData().then(() => { timer = setInterval(fetchData, REFRESH_SEC * 1000); });
});

async function doLogin() {
  const val = $pw.value.trim();
  if (!val) return;
  $loginBtn.disabled = true;
  $loginBtn.innerHTML = '<span class="spinner"></span>驗證中...';
  $loginErr.textContent = "";
  pw = val;
  const ok = await fetchData();
  if (ok) { sessionStorage.setItem("mpw", pw); showDash(); }
  else {
    pw = "";
    $loginErr.textContent = "密碼錯誤或無法連線";
    $loginBtn.disabled = false; $loginBtn.textContent = "登入";
  }
}

function showDash() {
  $login.style.display = "none"; $dash.style.display = "flex";
  clearInterval(timer);
  timer = setInterval(fetchData, REFRESH_SEC * 1000);
}

async function fetchData() {
  $sync.className = ""; $sync.innerHTML = '<span class="spinner"></span>';
  if (DEMO) {
    // 不打網路，直接拿假資料
    await new Promise(r => setTimeout(r, 120));
    render(MOCK.rows());
    $sync.className = "ok";
    $sync.textContent = "DEMO · " + new Date().toLocaleTimeString("zh-TW");
    return true;
  }
  try {
    const res = await fetch(EDGE_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ password: pw }),
    });
    if (res.status === 401) { $sync.className = "err"; $sync.textContent = "密碼錯誤"; return false; }
    if (!res.ok) throw new Error(res.status);
    const { rows } = await res.json();
    render(rows ?? []);
    $sync.className = "ok";
    $sync.textContent = "更新於 " + new Date().toLocaleTimeString("zh-TW");
    return true;
  } catch {
    $sync.className = "err"; $sync.textContent = "連線失敗"; return false;
  }
}

// DEMO: 控制列當前狀態 + 最近一次 rows 快取，方便切換時重繪
let _demoWindowMin = 20;
let _demoMinZero   = false;
let _lastRows      = null;

function effStatus(row) {
  const mins = (Date.now() - new Date(row.last_seen)) / 60000;
  if (mins > OFFLINE_MINS) return "offline";
  return row.status || "offline";
}

const STATUS_LABEL = { running:"執行中", warning:"警告", error:"異常/中斷", offline:"離線" };

function makeBadge(s) {
  return `<span class="badge badge-${s}"><span class="badge-dot"></span>${esc(STATUS_LABEL[s]??s)}</span>`;
}

function render(rows) {
  _lastRows = rows;  // demo: 切換控制列後可重繪
  let r=0,w=0,e=0,o=0,d=0,runs=0;
  rows.forEach(row => {
    const s = effStatus(row);
    if(s==="running")r++; else if(s==="warning")w++; else if(s==="error")e++; else o++;
    d    += (parseInt(row.deposits_count, 10) || 0);
    runs += (parseInt(row.runs_count,     10) || 0);
  });
  document.getElementById("cnt-running").textContent  = r;
  document.getElementById("cnt-warning").textContent  = w;
  document.getElementById("cnt-error").textContent    = e;
  document.getElementById("cnt-offline").textContent  = o;
  document.getElementById("cnt-deposits").textContent = d;
  document.getElementById("cnt-runs").textContent     = runs;
  document.getElementById("cnt-total").textContent    = rows.length;

  // 推送每台機器的快照到 sparkline 歷史
  rows.forEach(row => {
    pushSparkPoint(
      row.machine_id,
      parseInt(row.deposits_count, 10) || 0,
      parseInt(row.runs_count,     10) || 0
    );
  });

  // 清除已不存在的機器 ID 歷史
  const activeIds = new Set(rows.map(r => r.machine_id));
  const h = loadSparkHistory();
  let changed = false;
  Object.keys(h).forEach(id => {
    if (!activeIds.has(id)) { delete h[id]; changed = true; }
  });
  if (changed) saveSparkHistory(h);

  const grid = document.getElementById("cards-grid");

  if (rows.length === 0) {
    grid.innerHTML = '<div class="empty-state">尚無裝置資料</div>';
    return;
  }

  // apply saved order from localStorage, fallback to name sort
  const savedOrder = getSavedOrder();
  if (savedOrder.length) {
    rows = [...rows].sort((a, b) => {
      const ai = savedOrder.indexOf(a.machine_id);
      const bi = savedOrder.indexOf(b.machine_id);
      const av = ai === -1 ? 9999 : ai;
      const bv = bi === -1 ? 9999 : bi;
      if (av !== bv) return av - bv;
      return (a.user_name||'').localeCompare(b.user_name||'', 'zh-TW');
    });
  } else {
    rows = [...rows].sort((a,b) => (a.user_name||'').localeCompare(b.user_name||'', 'zh-TW'));
  }

  const sparkHistory = loadSparkHistory();

  grid.innerHTML = rows.map(row => {
    const s   = effStatus(row);
    const rph = fmtRph(row.runs_count, row.elapsed_seconds);
    const elt = fmtElapsed(row.elapsed_seconds);
    const errHtml = row.error_msg
      ? `<div class="mcard-err" title="${esc(row.error_msg)}">⚠ ${esc(row.error_msg)}</div>`
      : "";

    // sparkline
    const sid  = row.machine_id;
    const hist = sparkHistory[sid] || { deposits: [], runs: [] };
    // 刷場：累計 → 視窗 rph 速率序列；視窗大小與 minZero 由 demo 控制列決定
    const runsRate = toRateSeries(hist.runs, _demoWindowMin * 60 * 1000);
    const sparkRuns = makeSpark(runsRate, "#40d67e", { minZero: _demoMinZero });
    // 取最新一點當作「當前 rph」顯示在標題列右側
    const curRph = runsRate.length ? runsRate[runsRate.length - 1].v.toFixed(1) : null;
    const peakRph = runsRate.length ? Math.max(...runsRate.map(p => p.v)).toFixed(1) : null;

    // 存金幣：用文字呈現「上次距今多久 + 平均間隔」
    //   - 跳過 t0 那筆 v=0 的 placeholder
    //   - 平均間隔取最近最多 5 個 interval（少於 2 筆則不顯示）
    //   - 距今 > 3h 標紅（正常 ~2h 一次）
    let depPrimary = '—', depSecondary = '', depStale = false;
    const realDeps = (hist.deposits || []).filter(p => p.v > 0);
    if (realDeps.length >= 1) {
      const lastT = realDeps[realDeps.length - 1].t;
      const sinceMs = Date.now() - lastT;
      depStale = sinceMs > 2.5 * 3600 * 1000;
      depPrimary = `上次 ${fmtDur(sinceMs)} 前`;
      if (realDeps.length >= 2) {
        const N = Math.min(5, realDeps.length - 1);
        let sum = 0;
        for (let i = realDeps.length - N; i < realDeps.length; i++) {
          sum += realDeps[i].t - realDeps[i-1].t;
        }
        depSecondary = `間隔 ~${fmtDur(sum / N)}`;
      }
    }

    const rt  = relTime(row.last_seen);
    return `<div class="mcard ${s}" draggable="true" data-id="${esc(sid)}" data-status="${s}" data-name="${esc(row.user_name||'')}" data-mid="${esc(sid)}">
      <div class="mcard-drag-hint"><span></span><span></span><span></span></div>
      <div class="mcard-head">
        <div style="min-width:0; flex:1;">
          <div style="display:flex; align-items:baseline; gap:7px; flex-wrap:wrap;">
            <div class="mcard-name">${esc(row.user_name||"未命名")}</div>
            <div class="mcard-id">${esc(sid)}</div>
          </div>
          <div style="display:flex; align-items:center; margin-top:3px;">
            ${(row.app_version || row.python_version) ? `<span style="font-family:var(--mono);font-size:10px;color:var(--dim2);" title="UI: ${esc(row.app_version||'—')} / Bot: ${esc(row.python_version||'—')}">${esc(row.app_version||'—')} / ${esc(row.python_version||'—')}</span>` : ''}
          </div>
        </div>
        ${makeBadge(s)}
      </div>
      <div class="mcard-stats">
        <div class="mstat">
          <div class="mstat-val ${row.runs_count?'':'dim'}">${row.runs_count||"—"}</div>
          <div class="mstat-label">刷場數</div>
        </div>
        <div class="mstat">
          <div class="mstat-val ${rph!=='—'?'':'dim'}">${rph}</div>
          <div class="mstat-label">場 / 時</div>
        </div>
        <div class="mstat">
          <div class="mstat-val ${elt!=='—'?'':'dim'}" style="font-size:14px;">${elt}</div>
          <div class="mstat-label">運行時間</div>
        </div>
      </div>
      <div class="mcard-spark">
        <div class="spark-item" style="flex: 0 0 38%;">
          <div class="spark-label">存金幣節奏</div>
          <div class="dep-info">
            <span class="dep-info-primary ${depStale ? 'stale' : ''}">${depPrimary}</span>
            ${depSecondary ? `<span class="dep-info-secondary">${depSecondary}</span>` : ''}
          </div>
        </div>
        <div class="spark-item">
          <div class="spark-label">
            <span>場/時 趨勢</span>
            <span style="float:right; color:var(--dim); font-family:var(--mono); letter-spacing:0; text-transform:none;">
              ${curRph !== null ? `現 ${curRph}` : '—'}${peakRph !== null ? ` · 峰 ${peakRph}` : ''}
            </span>
          </div>
          ${sparkRuns}
        </div>
      </div>
      <div class="mcard-foot">
        <div class="mcard-meta">
          <div class="mcard-metaitem"><span class="mcard-metaitem-label">存金幣</span><span class="mcard-metaitem-val">${row.deposits_count}</span></div>
          <div class="mcard-metaitem"><span class="mcard-metaitem-label">修裝備</span><span class="mcard-metaitem-val">${row.repairs_count}</span></div>
        </div>
        <div class="mcard-time ${rt.cls}" title="${esc(row.last_seen)}">${rt.text}</div>
      </div>
      ${errHtml}
    </div>`;
  }).join("");

  // activate drag-and-drop after rendering
  initDrag();
  applyFilters();
}

// ── Sparkline history (localStorage) ─
const LS_SPARK = "mabi_spark_history";
const SPARK_MAX    = 500;          // 每台最多 500 筆（防爆用）
const SPARK_TTL_MS = 3 * 24 * 60 * 60 * 1000; // 保留 3 天

// DEMO: 用 MOCK.history() 取代 localStorage，避免污染本機快取
function loadSparkHistory() {
  if (DEMO) return MOCK.history();
  try { return JSON.parse(localStorage.getItem(LS_SPARK) || "{}"); } catch { return {}; }
}
function saveSparkHistory(h) {
  if (DEMO) return;  // demo 模式不寫
  localStorage.setItem(LS_SPARK, JSON.stringify(h));
}
function pushSparkPoint(id, deposits, runs) {
  if (DEMO) return;  // demo 模式不推（歷史已預先生成）
  const h = loadSparkHistory();
  if (!h[id]) h[id] = { deposits: [], runs: [] };
  const ts  = Date.now();
  const cut = ts - SPARK_TTL_MS;

  // 去重：只有數值改變時才推新快照
  const lastD = h[id].deposits.length ? h[id].deposits[h[id].deposits.length - 1].v : null;
  const lastR = h[id].runs.length     ? h[id].runs[h[id].runs.length - 1].v         : null;
  if (deposits !== lastD) h[id].deposits.push({ t: ts, v: deposits });
  if (runs     !== lastR) h[id].runs.push({ t: ts, v: runs });

  // 清除 3 天以前的舊資料
  h[id].deposits = h[id].deposits.filter(p => p.t >= cut).slice(-SPARK_MAX);
  h[id].runs     = h[id].runs.filter(p => p.t >= cut).slice(-SPARK_MAX);

  saveSparkHistory(h);
}

// 把累計序列轉成「視窗速率」序列
//   每點的速率 = 視窗內 (Δ累計值) / (Δ時間, 小時)
//   遇到累計值下降（機器重啟）會從重啟點起算
//   windowMs 預設 30 分鐘：足以平滑單筆 1~2 場的小跳動，又能反映效率變化
function toRateSeries(points, windowMs = 30 * 60 * 1000) {
  if (!points || points.length < 2) return [];
  const out = [];
  for (let i = 1; i < points.length; i++) {
    const tI = points[i].t;
    const vI = points[i].v;
    let j = i;
    while (j > 0) {
      const prev = points[j - 1];
      if (tI - prev.t > windowMs) break;       // 已超出視窗
      if (prev.v > points[j].v) break;          // 邊界 j 偵測到重啟
      j--;
    }
    if (j === i) continue;                       // 沒可用前一點（重啟剛發生）
    const dt = (tI - points[j].t) / 3600000;     // 小時
    if (dt <= 0) continue;
    const dv = vI - points[j].v;
    out.push({ t: tI, v: dv < 0 ? 0 : dv / dt });
  }
  return out;
}

// 渲染 sparkline。
//   - x 軸用「時間」而非陣列索引：兩點之間時間越久，水平距離越長 → 資料中斷會視覺呈現
//   - 相鄰兩點時間差超過 gapMs 視為「斷線」：折線斷開，中間以虛線連接
//   - opts.minZero=true：把 y 軸下限鎖在 0（適合 rph 圖，「停擺=貼底、滿速=貼頂」）
function makeSpark(points, color, opts = {}) {
  if (!points || points.length < 2) {
    return `<svg class="spark-svg" viewBox="0 0 100 28" preserveAspectRatio="none">
      <line x1="0" y1="20" x2="100" y2="20" stroke="${color}" stroke-width="1" stroke-dasharray="3,3" opacity=".25"/>
    </svg>`;
  }
  const W = 100, H = 28, pad = 3;
  const gapMs = opts.gapMs ?? 60 * 60 * 1000;   // > 1 小時無樣本 → 視為斷線

  const vals = points.map(p => p.v);
  const min  = opts.minZero ? 0 : Math.min(...vals);
  const max  = Math.max(...vals);
  const range = max - min || 1;
  const tMin = points[0].t;
  const tMax = points[points.length - 1].t;
  const tRange = tMax - tMin || 1;

  const coords = points.map(p => ({
    x: ((p.t - tMin) / tRange) * W,
    y: H - pad - ((p.v - min) / range) * (H - pad * 2),
    t: p.t,
  }));

  // 依時間 gap 切分連續段
  const segments = [[coords[0]]];
  for (let i = 1; i < coords.length; i++) {
    if (coords[i].t - coords[i - 1].t > gapMs) {
      segments.push([coords[i]]);
    } else {
      segments[segments.length - 1].push(coords[i]);
    }
  }

  const gradId = `sg-${color.replace('#','')}-${Math.random().toString(36).slice(2,7)}`;
  let body = '';

  // 各段繪 area + polyline；單點段繪小圓
  segments.forEach(seg => {
    if (seg.length === 1) {
      body += `<circle cx="${seg[0].x.toFixed(1)}" cy="${seg[0].y.toFixed(1)}" r="1.7" fill="${color}"/>`;
      return;
    }
    const polyStr = seg.map(p => `${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');
    const x0 = seg[0].x.toFixed(1);
    const xN = seg[seg.length - 1].x.toFixed(1);
    body += `<polygon points="${x0},${H} ${polyStr} ${xN},${H}" fill="url(#${gradId})"/>`;
    body += `<polyline points="${polyStr}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>`;
  });

  // 段與段之間的斷線：虛線連接
  for (let i = 1; i < segments.length; i++) {
    const a = segments[i - 1][segments[i - 1].length - 1];
    const b = segments[i][0];
    body += `<line x1="${a.x.toFixed(1)}" y1="${a.y.toFixed(1)}" x2="${b.x.toFixed(1)}" y2="${b.y.toFixed(1)}" stroke="${color}" stroke-width="1" stroke-dasharray="2,2" opacity=".35"/>`;
  }

  // 末端強調點
  const last = coords[coords.length - 1];

  return `<svg class="spark-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    <defs>
      <linearGradient id="${gradId}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="${color}" stop-opacity=".25"/>
        <stop offset="100%" stop-color="${color}" stop-opacity="0"/>
      </linearGradient>
    </defs>
    ${body}
    <circle cx="${last.x.toFixed(1)}" cy="${last.y.toFixed(1)}" r="2.5" fill="${color}"/>
  </svg>`;
}

// ── localStorage order ───────────────
const LS_KEY = "mabi_card_order";
function getSavedOrder() {
  try { return JSON.parse(localStorage.getItem(LS_KEY) || "[]"); } catch { return []; }
}
function saveOrder(ids) {
  localStorage.setItem(LS_KEY, JSON.stringify(ids));
}
function currentOrder() {
  return [...document.querySelectorAll("#cards-grid .mcard")].map(el => el.dataset.id);
}

// ── Drag and drop (mouse + touch) ───
function initDrag() {
  const grid = document.getElementById("cards-grid");
  let dragged = null;

  // ── Mouse drag (desktop) ─────────
  grid.querySelectorAll(".mcard").forEach(card => {
    card.addEventListener("dragstart", e => {
      dragged = card;
      card.classList.add("dragging");
      e.dataTransfer.effectAllowed = "move";
    });
    card.addEventListener("dragend", () => {
      card.classList.remove("dragging");
      grid.querySelectorAll(".mcard").forEach(c => c.classList.remove("drag-over"));
      saveOrder(currentOrder());
      dragged = null;
    });
    card.addEventListener("dragover", e => {
      e.preventDefault();
      if (card === dragged) return;
      grid.querySelectorAll(".mcard").forEach(c => c.classList.remove("drag-over"));
      card.classList.add("drag-over");
    });
    card.addEventListener("dragleave", () => card.classList.remove("drag-over"));
    card.addEventListener("drop", e => {
      e.preventDefault();
      if (!dragged || card === dragged) return;
      card.classList.remove("drag-over");
      const cards = [...grid.querySelectorAll(".mcard")];
      const dragIdx = cards.indexOf(dragged);
      const dropIdx = cards.indexOf(card);
      if (dragIdx < dropIdx) grid.insertBefore(dragged, card.nextSibling);
      else grid.insertBefore(dragged, card);
      saveOrder(currentOrder());
    });
  });

  // ── Touch drag (mobile, long-press to activate) ──
  let touchDragged = null;
  let touchClone   = null;
  let touchOffX = 0, touchOffY = 0;
  let longPressTimer = null;
  let touchActive = false;

  grid.querySelectorAll(".mcard").forEach(card => {
    card.addEventListener("touchstart", e => {
      if (e.touches.length !== 1) return;
      const t = e.touches[0];
      const rect = card.getBoundingClientRect();
      touchOffX = t.clientX - rect.left;
      touchOffY = t.clientY - rect.top;

      card.classList.add("press-active");
      longPressTimer = setTimeout(() => {
        touchActive = true;
        touchDragged = card;
        card.classList.remove("press-active");
        card.classList.add("dragging");

        // ghost clone
        const r = card.getBoundingClientRect();
        touchClone = card.cloneNode(true);
        touchClone.style.cssText = `
          position: fixed;
          top: ${r.top}px;
          left: ${r.left}px;
          width: ${r.width}px;
          pointer-events: none;
          opacity: .7;
          z-index: 999;
          border-radius: var(--r);
          box-shadow: 0 8px 32px rgba(0,0,0,.5);
          transition: none;
        `;
        document.body.appendChild(touchClone);

        // vibrate if supported
        if (navigator.vibrate) navigator.vibrate(40);
      }, 400);
    }, { passive: true });

    card.addEventListener("touchmove", e => {
      if (!touchActive) {
        // cancel long press if finger moved
        if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
        const card2 = e.currentTarget; card2.classList.remove("press-active");
        return;
      }
      e.preventDefault();
      const t = e.touches[0];
      if (touchClone) {
        touchClone.style.top  = (t.clientY - touchOffY) + "px";
        touchClone.style.left = (t.clientX - touchOffX) + "px";
      }
      // find card under finger
      if (touchClone) touchClone.style.display = "none";
      const el = document.elementFromPoint(t.clientX, t.clientY);
      if (touchClone) touchClone.style.display = "";
      const target = el && el.closest(".mcard");
      grid.querySelectorAll(".mcard").forEach(c => c.classList.remove("drag-over"));
      if (target && target !== touchDragged) target.classList.add("drag-over");
    }, { passive: false });

    card.addEventListener("touchend", e => {
      if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
      card.classList.remove("press-active");
      if (!touchActive) return;
      touchActive = false;

      const t = e.changedTouches[0];
      if (touchClone) { touchClone.remove(); touchClone = null; }
      if (touchDragged) touchDragged.classList.remove("dragging");
      grid.querySelectorAll(".mcard").forEach(c => c.classList.remove("drag-over"));

      const el = document.elementFromPoint(t.clientX, t.clientY);
      const target = el && el.closest(".mcard");
      if (target && target !== touchDragged) {
        const cards = [...grid.querySelectorAll(".mcard")];
        const dragIdx = cards.indexOf(touchDragged);
        const dropIdx = cards.indexOf(target);
        if (dragIdx < dropIdx) grid.insertBefore(touchDragged, target.nextSibling);
        else grid.insertBefore(touchDragged, target);
        saveOrder(currentOrder());
      }
      touchDragged = null;
    }, { passive: true });

    card.addEventListener("touchcancel", () => {
      if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
      touchActive = false;
      if (touchClone) { touchClone.remove(); touchClone = null; }
      if (touchDragged) touchDragged.classList.remove("dragging");
      touchDragged && touchDragged.classList.remove("press-active");
      grid.querySelectorAll(".mcard").forEach(c => c.classList.remove("drag-over"));
      touchDragged = null;
    }, { passive: true });
  });
}

function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function relTime(iso){
  const s=(Date.now()-new Date(iso))/1000;
  let text, cls="";
  if(s<60)       text=Math.round(s)+" 秒前";
  else if(s<3600) text=Math.round(s/60)+" 分前";
  else if(s<86400)text=Math.round(s/3600)+" 時前";
  else            text=Math.round(s/86400)+" 天前";
  if(s>600)  cls="stale";       // 超過 10 分鐘：紅色
  else if(s>180) cls="warn";    // 超過 3 分鐘：黃色
  return { text, cls };
}
function fmtElapsed(sec){if(!sec||sec<=0)return"—";const h=Math.floor(sec/3600),m=Math.floor((sec%3600)/60),s=sec%60;return`${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;}
function fmtRph(runs,sec){if(!sec||sec<=0||!runs)return"—";return(runs/(sec/3600)).toFixed(1);}
// 格式化時長（毫秒 → "5m" / "1h32m" / "12h"）
function fmtDur(ms){
  const min = Math.max(0, Math.round(ms / 60000));
  if (min < 60) return `${min}m`;
  const h = Math.floor(min / 60), m = min % 60;
  return m === 0 ? `${h}h` : `${h}h${String(m).padStart(2,"0")}m`;
}
